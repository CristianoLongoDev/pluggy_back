apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-webhook
  namespace: whatsapp-webhook
  labels:
    app: whatsapp-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsapp-webhook
  template:
    metadata:
      labels:
        app: whatsapp-webhook
    spec:
      containers:
      - name: whatsapp-webhook
        image: cristianopluggerbi/whatsapp-webhook:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: WEBHOOK_VERIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: whatsapp-webhook-secret
              key: WEBHOOK_VERIFY_TOKEN
        - name: DEBUG
          value: "False"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "5000"
        - name: LOG_LEVEL
          value: "INFO"
        - name: USE_SSL
          value: "False"
        - name: DB_HOST
          value: "10.0.10.69"
        - name: DB_PORT
          value: "6446"
        - name: DB_NAME
          value: "atendimento"
        - name: DB_USER
          value: "atendimento"
        - name: DB_PASSWORD
          value: "8/vLQv98vCmw%Ox1"
        - name: DB_ENABLED
          value: "True"
        - name: RABBITMQ_ENABLED
          value: "True"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service.whatsapp-webhook.svc.cluster.local"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          value: "admin"
        - name: RABBITMQ_PASSWORD
          value: "rabbitmq123"
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: whatsapp-webhook-secret
              key: SUPABASE_URL
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: whatsapp-webhook-secret
              key: SUPABASE_ANON_KEY
        - name: AUTH_BOOTSTRAP_SECRET
          value: "VtCXlegSaKNxoFgBmlYEjKYzASKA5sXZLeVuw941A3k"
        - name: SMTP_HOST
          value: "smtp.email.sa-saopaulo-1.oci.oraclecloud.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USER
          value: "ocid1.user.oc1..aaaaaaaactxeznak3sqzncllsxld53a2jh7cn2jnwzmfvrebswfrr6ffldfq@ocid1.tenancy.oc1..aaaaaaaapdhesajf3zt5d4etvxcdwwzy7gond2flxsied6rsh3tsjdrj7yma.sg.com"
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: whatsapp-webhook-secret
              key: SMTP_PASSWORD
        - name: SMTP_FROM_EMAIL
          value: "sending@pluggerbi.com"
        - name: SMTP_FROM_NAME
          value: "Plugger BI"
        - name: FRONTEND_URL
          value: "https://pluggyapi.pluggerbi.com"
        workingDir: /app
        command: ["python"]
        args: ["app.py"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi" 
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3