apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-frontend
  namespace: whatsapp-webhook
  labels:
    app: whatsapp-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsapp-frontend
  template:
    metadata:
      labels:
        app: whatsapp-frontend
    spec:
      containers:
      - name: whatsapp-frontend
        image: cristianopluggerbi/whatsapp-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: whatsapp-frontend-service
  namespace: whatsapp-webhook
  labels:
    app: whatsapp-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: whatsapp-frontend 