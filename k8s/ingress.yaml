apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whatsapp-webhook-ingress
  namespace: whatsapp-webhook
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - atendimento.pluggerbi.com
    secretName: whatsapp-webhook-tls
  rules:
  - host: atendimento.pluggerbi.com
    http:
      paths:
      # Rotas da API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: whatsapp-webhook-service
            port:
              number: 80
      - path: /webhook
        pathType: Prefix
        backend:
          service:
            name: whatsapp-webhook-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: whatsapp-webhook-service
            port:
              number: 80
      - path: /logs
        pathType: Prefix
        backend:
          service:
            name: whatsapp-webhook-service
            port:
              number: 80
      - path: /rabbitmq
        pathType: Prefix
        backend:
          service:
            name: whatsapp-webhook-service
            port:
              number: 80
      # Frontend (deve ser por último)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whatsapp-frontend-service
            port:
              number: 80 