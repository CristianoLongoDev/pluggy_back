apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatgpt-delay-worker
  namespace: whatsapp-webhook
  labels:
    app: chatgpt-delay-worker
    version: optimized
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatgpt-delay-worker
  template:
    metadata:
      labels:
        app: chatgpt-delay-worker
        version: optimized
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - chatgpt-delay-worker
              topologyKey: kubernetes.io/hostname
      containers:
      - name: chatgpt-delay-worker
        image: cristianopluggerbi/delay-worker:latest
        imagePullPolicy: Always
        env:
        - name: WEBHOOK_VERIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: whatsapp-webhook-secret
              key: WEBHOOK_VERIFY_TOKEN
        - name: MOVIDESK_TOKEN
          valueFrom:
            secretKeyRef:
              name: whatsapp-webhook-secret
              key: MOVIDESK_TOKEN
        - name: DB_HOST
          value: "168.75.106.98"
        - name: DB_PORT
          value: "6446"
        - name: DB_NAME
          value: "atendimento"
        - name: DB_USER
          value: "atendimento"
        - name: DB_PASSWORD
          value: "8/vLQv98vCmw%Ox1"
        - name: DB_ENABLED
          value: "True"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service.whatsapp-webhook.svc.cluster.local"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: password
        - name: RABBITMQ_ENABLED
          value: "True"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import sys; import os; sys.exit(0 if os.path.exists('/tmp/chatgpt_delay_worker.log') else 1)"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "test -f /tmp/chatgpt_delay_worker.log && echo 'Delay worker ready'"
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: tmp-logs
          mountPath: /tmp
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      volumes:
      - name: tmp-logs
        emptyDir:
          sizeLimit: 10Mi 