apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-worker
  namespace: whatsapp-webhook
  labels:
    app: webhook-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webhook-worker
  template:
    metadata:
      labels:
        app: webhook-worker
    spec:
      containers:
      - name: webhook-worker
        image: python:3.11-slim
        workingDir: /app
        command: ["/bin/bash"]
        args:
        - -c
        - |
          if [ ! -f /tmp/dependencies_installed ]; then
            pip install --no-cache-dir -r requirements.txt
            touch /tmp/dependencies_installed
          fi
          python webhook_worker.py webhook_messages
        env:
        - name: WEBHOOK_VERIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: whatsapp-webhook-secret
              key: WEBHOOK_VERIFY_TOKEN
        - name: DB_HOST
          value: "168.75.106.98"
        - name: DB_PORT
          value: "6446"
        - name: DB_NAME
          value: "atendimento"
        - name: DB_USER
          value: "atendimento"
        - name: DB_PASSWORD
          value: "8/vLQv98vCmw%Ox1"
        - name: DB_ENABLED
          value: "True"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service.whatsapp-webhook.svc.cluster.local"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: password
        - name: RABBITMQ_ENABLED
          value: "True"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: app-code
          mountPath: /app
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import sys; sys.exit(0)"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
      volumes:
      - name: app-code
        configMap:
          name: whatsapp-webhook-config
      restartPolicy: Always
---
