    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WhatsApp Webhook - Dashboard</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
    
            .container {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                padding: 40px;
                text-align: center;
                max-width: 600px;
                width: 90%;
            }
    
            .logo {
                width: 80px;
                height: 80px;
                background: #25D366;
                border-radius: 50%;
                margin: 0 auto 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 40px;
                color: white;
            }
    
            h1 {
                color: #333;
                margin-bottom: 10px;
                font-size: 28px;
            }
    
            .subtitle {
                color: #666;
                margin-bottom: 30px;
                font-size: 16px;
            }
    
            .btn {
                background: #25D366;
                color: white;
                border: none;
                padding: 15px 30px;
                border-radius: 50px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-bottom: 20px;
            }
    
            .btn:hover {
                background: #128C7E;
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            }
    
            .btn:disabled {
                background: #ccc;
                cursor: not-allowed;
                transform: none;
            }
    
            .result-container {
                margin-top: 20px;
            }
    
            .result-label {
                color: #333;
                margin-bottom: 10px;
                font-weight: bold;
                text-align: left;
            }
    
            .result-field {
                width: 100%;
                min-height: 120px;
                background: #f8f9fa;
                border: 2px solid #e9ecef;
                border-radius: 10px;
                padding: 15px;
                font-family: monospace;
                font-size: 14px;
                color: #666;
                resize: vertical;
                text-align: left;
                transition: all 0.3s ease;
            }
    
            .result-field:focus {
                outline: none;
                border-color: #25D366;
                box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
            }
    
            .result-field.has-content {
                background: white;
                color: #333;
                border-color: #25D366;
            }
    
            .loading {
                display: none;
                color: #666;
                font-style: italic;
                margin: 10px 0;
            }
    
            .loading.show {
                display: block;
            }
    
            .status {
                margin-top: 20px;
                padding: 10px;
                border-radius: 5px;
                font-weight: bold;
            }
    
            .status.success {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }
    
            .status.error {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }
    
            .status.info {
                background: #d1ecf1;
                color: #0c5460;
                border: 1px solid #bee5eb;
            }
    
            .endpoints {
                margin-top: 30px;
                text-align: left;
            }
    
            .endpoints h3 {
                color: #333;
                margin-bottom: 10px;
            }
    
            .endpoint {
                background: #f8f9fa;
                padding: 10px;
                margin: 5px 0;
                border-radius: 5px;
                font-family: monospace;
                font-size: 14px;
            }
    
            .clear-btn {
                background: #6c757d;
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: 10px;
            }
    
            .clear-btn:hover {
                background: #5a6268;
            }
    
            .clear-btn:disabled {
                background: #ccc;
                cursor: not-allowed;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="logo">📱</div>
            <h1>WhatsApp Webhook</h1>
            <p class="subtitle">Dashboard da API de Webhook do WhatsApp Business</p>
            
            <button class="btn" onclick="callAPI()" id="apiBtn">
                🚀 Chamar API
            </button>
            
            <div class="loading" id="loading">
                ⏳ Carregando resposta da API...
            </div>
            
            <div class="result-container">
                <div class="result-label">📋 Resposta da API:</div>
                <textarea 
                    class="result-field" 
                    id="apiResponse" 
                    placeholder="Clique no botão acima para chamar a API e ver a resposta aqui..."
                    readonly
                ></textarea>
                <button class="clear-btn" onclick="clearResponse()" id="clearBtn" disabled>
                    🗑️ Limpar Resposta
                </button>
            </div>
            
            <div class="status" id="status"></div>
            
            <div class="endpoints">
                <h3>📋 Endpoints Disponíveis:</h3>
                <div class="endpoint">GET / - Página inicial (Frontend)</div>
                <div class="endpoint">GET /api - API principal</div>
                <div class="endpoint">GET /health - Status da API</div>
                <div class="endpoint">GET /webhook - Verificação do webhook</div>
                <div class="endpoint">POST /webhook - Receber eventos do WhatsApp</div>
            </div>
        </div>
    
        <script>
            async function callAPI() {
                const btn = document.getElementById('apiBtn');
                const loading = document.getElementById('loading');
                const apiResponse = document.getElementById('apiResponse');
                const status = document.getElementById('status');
                const clearBtn = document.getElementById('clearBtn');
                
                // Desabilitar botão e mostrar loading
                btn.disabled = true;
                btn.textContent = '⏳ Carregando...';
                loading.classList.add('show');
                status.className = 'status';
                
                try {
                    // Chamar a API na nova rota /api
                    const response = await fetch('/api');
                    const data = await response.json();
                    
                    // Exibir resultado
                    apiResponse.value = JSON.stringify(data, null, 2);
                    apiResponse.classList.add('has-content');
                    
                    // Habilitar botão de limpar
                    clearBtn.disabled = false;
                    
                    // Mostrar status de sucesso
                    status.textContent = `✅ Sucesso! Status: ${response.status} - Resposta recebida`;
                    status.className = 'status success';
                    
                } catch (error) {
                    // Exibir erro
                    apiResponse.value = `Erro na requisição: ${error.message}`;
                    apiResponse.classList.add('has-content');
                    
                    // Habilitar botão de limpar
                    clearBtn.disabled = false;
                    
                    // Mostrar status de erro
                    status.textContent = `❌ Erro na requisição: ${error.message}`;
                    status.className = 'status error';
                } finally {
                    // Reabilitar botão
                    btn.disabled = false;
                    btn.textContent = '🚀 Chamar API';
                    loading.classList.remove('show');
                }
            }
    
            function clearResponse() {
                const apiResponse = document.getElementById('apiResponse');
                const clearBtn = document.getElementById('clearBtn');
                const status = document.getElementById('status');
                
                // Limpar campo
                apiResponse.value = '';
                apiResponse.classList.remove('has-content');
                
                // Desabilitar botão de limpar
                clearBtn.disabled = true;
                
                // Limpar status
                status.textContent = '📝 Campo limpo. Clique no botão para chamar a API novamente.';
                status.className = 'status info';
            }
    
            // Mostrar mensagem inicial
            window.addEventListener('load', () => {
                const status = document.getElementById('status');
                status.textContent = '👋 Bem-vindo! Clique no botão para testar a API.';
                status.className = 'status info';
            });
        </script>
    </body>
    </html> 